syntax = "proto3";
package sluice.v1;

option go_package = "github.com/KidCarmi/Sluice/proto/sluicev1";

service SluiceService {
  // Sanitize processes a file and returns the sanitized version.
  // Streaming: client sends SanitizeHeader first, then bytes chunks.
  // Server responds with SanitizeResult first (always atomically),
  // then zero or more bytes chunks of sanitized content.
  // Do NOT interleave Threat objects after chunks start.
  rpc Sanitize(stream SanitizeRequest) returns (stream SanitizeResponse);

  // Health returns the service status, capabilities, and available profiles.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Enroll exchanges a one-time enrollment token for mTLS client certificates.
  // Does NOT require a client cert (chicken-and-egg). Clients must TOFU-verify
  // the server cert fingerprint before sending the token.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // RenewCert mints a fresh client certificate for an already-enrolled caller.
  // Requires a valid, unrevoked client cert on the mTLS channel; the new cert
  // uses the same Common Name as the presented one. The old cert keeps working
  // until its own NotAfter — this method does NOT revoke it (to avoid breaking
  // in-flight streams). Callers who want to revoke the old cert must call
  // RevokeClient(old_fingerprint) separately.
  //
  // Auto-renewal policy is up to the client. Sluice exposes
  // days_until_expiry in the response so pollers can decide when to call next.
  rpc RenewCert(RenewCertRequest) returns (RenewCertResponse);

  // RevokeClient immediately revokes a previously-issued client certificate
  // by its SHA-256 fingerprint. Synchronous: on return, the revocation is
  // persisted and the in-memory revoke-set is updated. Any subsequent RPC
  // from that client fails with PermissionDenied.
  //
  // Requires a valid mTLS client cert on the calling channel; callers cannot
  // revoke themselves by accident (use RevokeClient only for OTHER clients).
  rpc RevokeClient(RevokeClientRequest) returns (RevokeClientResponse);
}

message SanitizeRequest {
  oneof payload {
    SanitizeHeader header = 1;
    bytes chunk = 2;
  }
}

message SanitizeHeader {
  string filename = 1;
  string content_type = 2;
  int64 content_length = 3;
  string request_id = 4;
  string trace_parent = 5;         // W3C Traceparent: 00-<trace-id>-<parent-id>-<flags>

  // v0.1 — Culvert control-plane context (all optional, opaque to Sluice):

  // profile_name: name of the sanitization profile to apply.
  // Empty string is equivalent to "default".
  // Unknown names MUST be rejected with Status=ERROR and
  // error_message="unknown_profile: <name>".
  string profile_name = 6;

  // mode: how Sluice should treat threats. Server-enforced.
  Mode mode = 7;

  // tags: opaque key/value labels. Echoed in logs/metrics only; never
  // branched on. Low-cardinality keys (direction, dest_category) may
  // become Prometheus labels; high-cardinality values go to logs only.
  map<string, string> tags = 8;

  // policy_version: opaque hash of Culvert's active policy snapshot.
  // Logged for audit correlation. MUST NOT be used as a metric label
  // (cardinality explosion).
  string policy_version = 9;
}

enum Mode {
  // ENFORCE: default. Strip threats and return sanitized bytes.
  ENFORCE = 0;
  // REPORT_ONLY: detect only. Return original bytes unchanged + threat list.
  // Server MUST NOT alter bytes, regardless of what the profile would do.
  REPORT_ONLY = 1;
  // BYPASS_WITH_REPORT: same byte semantics as REPORT_ONLY. Culvert signals
  // VIP/monitor intent via this value; Sluice treats it identically.
  BYPASS_WITH_REPORT = 2;
}

message SanitizeResponse {
  oneof payload {
    SanitizeResult result = 1;
    bytes chunk = 2;
  }
}

message SanitizeResult {
  Status status = 1;
  string original_type = 2;
  int64 original_size = 3;
  // sanitized_size: size of bytes returned to the client.
  // In REPORT_ONLY / BYPASS_WITH_REPORT modes this equals original_size
  // because the server returns the original bytes unchanged. The
  // "what-would-have-been-sanitized" size is implicit from threats_removed.
  int64 sanitized_size = 4;
  repeated Threat threats_removed = 5;
  string error_message = 6;
  // sanitized_sha256: SHA-256 of the bytes returned. Lets the client's
  // hash cache skip re-sanitizing identical outputs.
  bytes sanitized_sha256 = 7;
  // duration_ms: server-side wall-clock sanitization time.
  int64 duration_ms = 8;
}

enum Status {
  CLEAN = 0;
  SANITIZED = 1;
  BLOCKED = 2;
  ERROR = 3;
  UNSUPPORTED = 4;
}

message Threat {
  // type: opaque, lowercase snake_case (macro, ole_object, javascript,
  // external_ref, launch_action, embedded_file, xfa_form, ...).
  string type = 1;
  string location = 2;
  string description = 3;
  // severity: MUST be exactly one of {low, medium, high, critical}.
  string severity = 4;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
  repeated string supported_types = 3;
  int32 active_workers = 4;
  int32 max_workers = 5;
  int32 queue_depth = 6;
  int64 files_processed = 7;
  int64 threats_removed = 8;
  // profiles: sanitization profiles this server offers. Used by Culvert's
  // admin GUI to present a profile picker. v0.1 ships with a single
  // "default" profile; v0.2+ adds aggressive, relaxed, etc.
  repeated Profile profiles = 9;

  // v0.2 — server certificate rotation dual-pin:
  //
  // server_fingerprint is the SHA-256 fingerprint of the currently-served
  // TLS certificate. Format: "sha256:" + lowercase hex. Clients that TOFU-
  // pinned at enrollment should compare their stored fingerprint against
  // this OR rotated_fingerprint.
  string server_fingerprint = 10;

  // rotated_fingerprint is the SHA-256 fingerprint of the PREVIOUS server
  // cert during a grace window. Empty string when no rotation is active.
  // Clients MAY accept connections whose handshake cert matches this one
  // while rotated_fingerprint_until_unix > now(), and auto-rewrite their
  // pin to server_fingerprint once the window closes.
  string rotated_fingerprint = 11;

  // rotated_fingerprint_until_unix is the unix timestamp (seconds) after
  // which rotated_fingerprint MUST be rejected. 0 when no rotation active.
  int64 rotated_fingerprint_until_unix = 12;
}

message Profile {
  // name: lowercase-hyphenated, stable once published. "default" is reserved.
  string name = 1;
  string description = 2;
  // capabilities: opaque strings describing what this profile does
  // (e.g. strip_macros, strip_js, strip_ole, re_encode_images, strip_xfa).
  repeated string capabilities = 3;
  // max_file_size_bytes: 0 = use server default.
  int64 max_file_size_bytes = 4;
}

message EnrollRequest {
  string token = 1;
}

message EnrollResponse {
  bytes ca_cert = 1;
  bytes client_cert = 2;
  bytes client_key = 3;
  string endpoint = 4;
}

// RenewCertRequest is intentionally empty in v0.2 — the caller is identified
// by its presented mTLS client cert. Wrapper message reserved for forward
// compatibility.
message RenewCertRequest {}

message RenewCertResponse {
  // client_cert is a fresh certificate signed by the server's CA, with the
  // same Common Name as the presented cert.
  bytes client_cert = 1;
  // client_key is the matching private key for client_cert.
  bytes client_key = 2;
  // days_until_expiry is a convenience for client poll schedulers —
  // floor((NotAfter - now) / 24h). Clients typically renew when < 30 days.
  int64 days_until_expiry = 3;
}

message RevokeClientRequest {
  // fingerprint: SHA-256 fingerprint of the client cert to revoke.
  // Format: "sha256:" + lowercase hex, matching CertFingerprintSHA256 output.
  string fingerprint = 1;
  // reason: opaque string echoed back to audit logs. Optional.
  string reason = 2;
}

message RevokeClientResponse {
  // revoked: true when the fingerprint was present in the active clients
  // list and is now revoked. false when the fingerprint was already revoked
  // or was never issued by this CA (idempotent behaviour).
  bool revoked = 1;
  // active_clients: remaining unrevoked clients, for Culvert dashboards.
  int32 active_clients = 2;
}
