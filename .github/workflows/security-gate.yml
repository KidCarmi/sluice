# =============================================================================
# Security Gate — SAST, vulnerability scanning, secret detection, license audit
# Runs on every push and pull request targeting the main branch.
# =============================================================================
name: Security Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed by gitleaks

      # -----------------------------------------------------------------------
      # 2. Set up the Go toolchain
      # -----------------------------------------------------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"

      # -----------------------------------------------------------------------
      # 3. Protobuf toolchain + regeneration drift check
      # Fails the build if checked-in pb.go files diverge from the .proto
      # source of truth (keeps client/server contracts in lockstep).
      # -----------------------------------------------------------------------
      - name: Install protoc + Go plugins
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Regenerate protobuf stubs
        run: make proto

      - name: Proto drift check
        run: |
          if ! git diff --quiet proto/sluicev1/; then
            echo "::error::proto/sluicev1 is out of date; run 'make proto' locally and commit the result"
            git diff proto/sluicev1/
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 4. Static Application Security Testing with gosec
      # Exclude generated protobuf code (standard unsafe.Slice from protoc-gen-go)
      # -----------------------------------------------------------------------
      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-generated ./...

      # -----------------------------------------------------------------------
      # 4. Go vulnerability database check
      # -----------------------------------------------------------------------
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # -----------------------------------------------------------------------
      # 5. Secret detection with gitleaks
      # -----------------------------------------------------------------------
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # -----------------------------------------------------------------------
      # 6. Filesystem vulnerability scan with Trivy
      # -----------------------------------------------------------------------
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: CRITICAL,HIGH
          exit-code: "1"

      # -----------------------------------------------------------------------
      # 7. Dependency health check — flag abandoned/unmaintained packages
      # -----------------------------------------------------------------------
      - name: Dependency Obituary
        uses: KidCarmi/Dependency-Obituary@main
        with:
          threshold: "60"
