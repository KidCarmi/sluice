# =============================================================================
# CI Pipeline — Build, Test, Lint
# Runs on every push and pull request targeting the main branch.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up the Go toolchain
      # -----------------------------------------------------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # -----------------------------------------------------------------------
      # 3. Static analysis with go vet
      # -----------------------------------------------------------------------
      - name: Run go vet
        run: go vet ./...

      # -----------------------------------------------------------------------
      # 4. Lint with golangci-lint
      # -----------------------------------------------------------------------
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      # -----------------------------------------------------------------------
      # 5. Unit tests with race detector
      # -----------------------------------------------------------------------
      - name: Run tests (race detector)
        run: go test -race -count=1 ./...

      # -----------------------------------------------------------------------
      # 6. Test coverage — fail if below 60%
      # -----------------------------------------------------------------------
      - name: Run tests (coverage)
        run: |
          go test -coverprofile=coverage.out ./...

          # Extract the total coverage percentage and enforce the threshold.
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"

          THRESHOLD=60
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 7. Build the binary
      # -----------------------------------------------------------------------
      - name: Build binary
        run: go build -o sluice ./cmd/sluice
