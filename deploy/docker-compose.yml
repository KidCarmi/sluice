services:
  sluice:
    image: ghcr.io/kidcarmi/sluice:latest
    container_name: culvert-sluice
    restart: unless-stopped
    # Run as the distroless nonroot user directly, bypassing the runtime
    # UID switch. Combined with cap_drop: ALL this avoids needing CAP_SETUID
    # to drop privileges at exec time.
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    # NOTE: `security_opt: no-new-privileges:true` is omitted because on some
    # Ubuntu hosts (with the default AppArmor + seccomp profile) it causes
    # `exec /sluice: operation not permitted` on distroless bases. Enable it
    # only if you've tested your host is compatible.
    ports:
      # mTLS gRPC — bound to localhost so only Culvert (same host) reaches it.
      - "127.0.0.1:8443:8443"
      # Prometheus scrape — also localhost-only; remote via Culvert.
      - "127.0.0.1:9190:9090"
    volumes:
      - sluice-data:/data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/sluice", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # No HTTP port (:8080) is published — the testing UI is disabled in
    # this overlay. All admin access goes through `docker exec ... sluice <cmd>`
    # or the mTLS gRPC port.

volumes:
  sluice-data:
