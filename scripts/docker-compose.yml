services:
  sluice:
    image: ghcr.io/kidcarmi/sluice:latest
    container_name: sluice
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web GUI
      - "8443:8443"   # gRPC
      - "9090:9090"   # Prometheus metrics
    volumes:
      - sluice-data:/data
      - ./config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/sluice", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sluice-data:
