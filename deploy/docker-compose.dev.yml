# Development compose — testing UI enabled, ports exposed on all interfaces
# so you can reach the GUI from your LAN while iterating. Build from source.
#
# For production use deploy/docker-compose.yml (the default).
# Usage: docker compose -f deploy/docker-compose.dev.yml up --build
services:
  sluice:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sluice
    restart: unless-stopped
    ports:
      - "8443:8443"   # mTLS gRPC
      - "8080:8080"   # Testing UI (HTTPS + bearer auth, see docker logs)
      - "9090:9090"   # Prometheus metrics
    volumes:
      - sluice-data:/data
      - ./config.dev.yaml:/config.yaml:ro
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/sluice", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sluice-data:
