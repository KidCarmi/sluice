services:
  sluice:
    image: ghcr.io/kidcarmi/sluice:latest
    container_name: culvert-sluice
    restart: unless-stopped
    # Run as the distroless nonroot user directly, bypassing the runtime
    # UID switch. Combined with cap_drop: ALL and no-new-privileges, runc
    # would otherwise fail execve with EPERM because it can't setuid from
    # root → nonroot without CAP_SETUID.
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      # mTLS gRPC — bound to localhost so only Culvert (same host) reaches it.
      - "127.0.0.1:8443:8443"
      # Prometheus scrape — also localhost-only; remote via Culvert.
      - "127.0.0.1:9190:9090"
    volumes:
      - sluice-data:/data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/sluice", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # No HTTP port (:8080) is published — the testing UI is disabled in
    # this overlay. All admin access goes through `docker exec ... sluice <cmd>`
    # or the mTLS gRPC port.

volumes:
  sluice-data:
