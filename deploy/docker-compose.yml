services:
  sluice:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sluice
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # Web GUI
      - "127.0.0.1:8443:8443"   # gRPC
      - "127.0.0.1:9090:9090"   # Prometheus metrics
    volumes:
      - sluice-data:/data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/sluice", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sluice-data:
